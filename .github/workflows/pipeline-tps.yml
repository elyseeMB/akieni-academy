name: Deploy TPs

on:
  workflow_run:
    workflows: ["Generate Listing"]
    types:
      - completed

jobs:
  deploy-tps:
    runs-on: ubuntu-latest
    permissions:
      deployments: write

    steps:
      - uses: actions/checkout@v4
      - name: Deploy each TP
        run: |
          for dir in tp*/; do
            name=$(basename $dir)
            npx wrangler pages deploy $dir \
              --project-name=${name}-akieniacademy-eembouz-com
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_AKIENI_ACADEMY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
