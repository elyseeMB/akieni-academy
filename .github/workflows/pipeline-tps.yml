name: Deploy TPs

on:
  workflow_run:
    workflows: ["Generate Listing"]
    types: [completed]

jobs:
  deploy-tps:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if TPs changed
        id: check
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          CHANGED=$(git diff --name-only $SHA~1 $SHA)
          echo "Changed: $CHANGED"

          if echo "$CHANGED" | grep -q "^tp"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy each TP
        if: steps.check.outputs.changed == 'true'
        run: |
          chmod +x .github/scripts/deploy-tp.sh
          for dir in tp*/; do
            name=$(basename $dir)
            .github/scripts/deploy-tp.sh $name
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_AKIENI_ACADEMY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
