name: Deploy TPs

on:
  workflow_run:
    workflows: ["Generate Listing"]
    types:
      - completed

jobs:
  deploy-tps:
    runs-on: ubuntu-latest
    permissions:
      deployments: write

    steps:
      - uses: actions/checkout@v4
      - name: Deploy each TP
        run: |
          for dir in tp*/; do
            name=$(basename $dir)
            npx wrangler pages project create ${name}-akieniacademy-eembouz-com \
              --production-branch main || true
            npx wrangler pages deploy $dir \
              --project-name=${name}-akieniacademy-eembouz-com

            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/${name}-akieniacademy-eembouz-com/domains" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"${name}.akieniacademy.eembouz.com\"}" || true

            curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"CNAME\",\"name\":\"${name}.akieniacademy\",\"content\":\"${name}-akieniacademy-eembouz-com.pages.dev\",\"proxied\":true}" || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_AKIENI_ACADEMY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
