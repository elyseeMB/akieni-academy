name: Deploy TPs

on:
  workflow_run:
    workflows: ["Generate Listing"]
    types:
      - completed

jobs:
  deploy-tps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if changed
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changing: $CHANGED"

          if echo "$CHANGED" | grep -q "^tp"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy each TP
        if: steps.check.outputs.changed == 'true'
        run: |
          chmod +x .github/scripts/deploy-tp.sh
          for dir in tp*/; do
            name=$(basename $dir)
            .github/scripts/deploy-tp.sh $name
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_AKIENI_ACADEMY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
