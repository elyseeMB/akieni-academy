name: Deploy

on:
  workflow_run:
    workflows: ["Generate Listing"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      deployments: write

    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          npx wrangler pages project create akieniacademy-eembouz-com \
          --production-branch main || true
          npx wrangler pages deploy . --project-name=akieniacademy-eembouz-com

          curl -s -X POST \
          "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/akieniacademy-eembouz-com/domains" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"name": "akieniacademy.eembouz.com"}' || true

          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"akieniacademy","content":"akieniacademy-eembouz-com.pages.dev","proxied":true}' || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_AKIENI_ACADEMY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
