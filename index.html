<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akienia Academy</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #0f0f0f;
        color: #fff;
        padding: 2rem;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 2rem;
      }

      #liste {
        list-style: none;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1rem;
      }

      #liste li a {
        display: block;
        padding: 1.5rem;
        background: #1a1a1a;
        border-radius: 8px;
        text-decoration: none;
        color: #fff;
        transition: background 0.2s;
      }

      #liste li a:hover {
        background: #2a2a2a;
      }

      #liste li a h2 {
        font-size: 1.1rem;
        margin-bottom: 0.5rem;
      }

      #liste li a p {
        font-size: 0.9rem;
        color: #888;
      }
    </style>
  </head>
  <body>
    <h1>Akienia Academy</h1>
    <ul id="liste"></ul>

    <script>
      const { tps } = await fetch('/listing.json').then(r => r.json());
      document.getElementById('liste').innerHTML = tps
        .map(tp => `<li><a href="${tp.url}">${tp.title}</a></li>`)
        .join('');
    </script>
  </body>
</html>
